<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crux</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    header {
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #1a1a1a;
    }

    main {
      display: flex;
      gap: 2rem;
    }

    #grid-container {
      display: grid;
      gap: 0;
      border: 2px solid #1a1a1a;
      background: #1a1a1a;
      width: fit-content;
    }

    .cell {
      width: 44px;
      height: 44px;
      position: relative;
      border: 1px solid #1a1a1a;
    }

    .cell-black {
      background: #1a1a1a;
    }

    .cell-white {
      background: #ffffff;
      cursor: pointer;
    }

    .cell-number {
      position: absolute;
      top: 1px;
      left: 2px;
      font-size: 10px;
      line-height: 1;
      color: #1a1a1a;
      pointer-events: none;
    }

    .cell-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 20px;
      font-weight: 500;
      color: #1a1a1a;
      text-transform: uppercase;
    }

    .cell-highlight {
      background: #c8e0f4;
    }

    .cell-active {
      background: #7fb8e0;
    }

    #clues-container {
      display: flex;
      gap: 2rem;
      max-height: 528px;
      overflow: hidden;
    }

    .clues-column {
      min-width: 200px;
      max-width: 260px;
    }

    .clues-column h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .clues-list {
      max-height: 496px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .clue-item {
      display: flex;
      gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1.4;
      color: #333;
    }

    .clue-item:hover {
      background: #eee;
    }

    .clue-number {
      font-weight: 700;
      min-width: 1.5em;
      color: #1a1a1a;
    }

    .clue-active {
      background: #c8e0f4;
    }

    .clue-active:hover {
      background: #c8e0f4;
    }
  </style>
</head>
<body>
  <header>
    <h1>Crux</h1>
  </header>
  <main>
    <div id="grid-container"></div>
    <div id="clues-container">
      <div class="clues-column">
        <h2>Horizontaal</h2>
        <div id="clues-horizontal" class="clues-list"></div>
      </div>
      <div class="clues-column">
        <h2>Verticaal</h2>
        <div id="clues-vertical" class="clues-list"></div>
      </div>
    </div>
  </main>
  <script>
    const puzzle = {
      rows: 5,
      cols: 5,
      grid: [
        [null, "",   "",   "",   null],
        ["",   "",   "",   null, null],
        [null, "",   null, null, null],
        [null, "",   "",   "",   ""  ],
        [null, null, null, null, null],
      ],
      solution: [
        [null, "K", "A", "T", null],
        ["B",  "O", "S", null, null],
        [null, "E", null, null, null],
        [null, "K", "A", "A", "S"],
        [null, null, null, null, null],
      ],
      clues: {
        horizontal: [
          { number: 1, row: 0, col: 1, length: 3, clue: "Huisdier dat spint" },
          { number: 3, row: 1, col: 0, length: 3, clue: "Gebied met veel bomen" },
          { number: 4, row: 3, col: 1, length: 4, clue: "Zuivelproduct uit Gouda" },
        ],
        vertical: [
          { number: 1, row: 0, col: 1, length: 4, clue: "Gebak, vaak met glazuur" },
          { number: 2, row: 0, col: 2, length: 2, clue: "Restant na verbranding" },
        ],
      },
    };

    console.assert(puzzle.grid.length === puzzle.rows,
      `Grid has ${puzzle.grid.length} rows, expected ${puzzle.rows}`);
    console.assert(puzzle.grid.every(row => row.length === puzzle.cols),
      `Not all grid rows have ${puzzle.cols} columns`);
    console.assert(puzzle.solution.length === puzzle.rows,
      `Solution has ${puzzle.solution.length} rows, expected ${puzzle.rows}`);
    console.assert(puzzle.solution.every(row => row.length === puzzle.cols),
      `Not all solution rows have ${puzzle.cols} columns`);
    for (let r = 0; r < puzzle.rows; r++) {
      for (let c = 0; c < puzzle.cols; c++) {
        const isBlackGrid = puzzle.grid[r][c] === null;
        const isBlackSolution = puzzle.solution[r][c] === null;
        console.assert(isBlackGrid === isBlackSolution,
          `Black cell mismatch at (${r},${c})`);
      }
    }
    console.log("Puzzle data validated OK");

    for (const clue of puzzle.clues.horizontal) clue.direction = 'horizontal';
    for (const clue of puzzle.clues.vertical) clue.direction = 'vertical';

    const state = {
      direction: 'horizontal',
      cursorCell: null,
      selectedWord: null,
      lastClickedCell: null,
      gridLetters: puzzle.grid.map(row =>
        row.map(cell => cell === null ? null : '')
      ),
    };

    function buildNumberMap(clues) {
      const map = {};
      for (const clue of [...clues.horizontal, ...clues.vertical]) {
        map[`${clue.row},${clue.col}`] = clue.number;
      }
      return map;
    }

    const wordLookup = buildWordLookup(puzzle);

    function buildWordLookup(puzzle) {
      const lookup = { horizontal: {}, vertical: {} };
      for (const clue of puzzle.clues.horizontal) {
        for (let i = 0; i < clue.length; i++) {
          lookup.horizontal[`${clue.row},${clue.col + i}`] = clue;
        }
      }
      for (const clue of puzzle.clues.vertical) {
        for (let i = 0; i < clue.length; i++) {
          lookup.vertical[`${clue.row + i},${clue.col}`] = clue;
        }
      }
      return lookup;
    }

    function getCell(row, col) {
      return document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
    }

    function getWordCells(clue) {
      const cells = [];
      for (let i = 0; i < clue.length; i++) {
        if (clue.direction === 'horizontal') {
          cells.push({ row: clue.row, col: clue.col + i });
        } else {
          cells.push({ row: clue.row + i, col: clue.col });
        }
      }
      return cells;
    }

    function findWordAt(row, col, direction) {
      return wordLookup[direction][`${row},${col}`] || null;
    }

    function firstEmptyCell(clue, fallback) {
      const cells = getWordCells(clue);
      for (const cell of cells) {
        if (state.gridLetters[cell.row][cell.col] === '') {
          return cell;
        }
      }
      return fallback || cells[0];
    }

    function renderGrid(puzzle) {
      const container = document.getElementById("grid-container");
      container.style.gridTemplateColumns = `repeat(${puzzle.cols}, 44px)`;
      container.style.gridTemplateRows = `repeat(${puzzle.rows}, 44px)`;

      const numberMap = buildNumberMap(puzzle.clues);

      for (let r = 0; r < puzzle.rows; r++) {
        for (let c = 0; c < puzzle.cols; c++) {
          const cell = document.createElement("div");
          cell.classList.add("cell");
          cell.dataset.row = r;
          cell.dataset.col = c;

          if (puzzle.grid[r][c] === null) {
            cell.classList.add("cell-black");
          } else {
            cell.classList.add("cell-white");

            const number = numberMap[`${r},${c}`];
            if (number !== undefined) {
              const numSpan = document.createElement("span");
              numSpan.classList.add("cell-number");
              numSpan.textContent = number;
              cell.appendChild(numSpan);
            }

            const letterSpan = document.createElement("span");
            letterSpan.classList.add("cell-letter");
            cell.appendChild(letterSpan);
          }

          container.appendChild(cell);
        }
      }
    }

    function updateHighlighting() {
      document.querySelectorAll('.cell-highlight, .cell-active').forEach(el => {
        el.classList.remove('cell-highlight', 'cell-active');
      });

      if (!state.selectedWord) return;

      const cells = getWordCells(state.selectedWord);
      for (const { row, col } of cells) {
        getCell(row, col).classList.add('cell-highlight');
      }

      if (state.cursorCell) {
        const active = getCell(state.cursorCell.row, state.cursorCell.col);
        active.classList.remove('cell-highlight');
        active.classList.add('cell-active');
      }
    }

    function selectWord(row, col) {
      const sameCell = state.lastClickedCell &&
        state.lastClickedCell.row === row && state.lastClickedCell.col === col;

      let direction = state.direction;

      if (sameCell) {
        const toggled = direction === 'horizontal' ? 'vertical' : 'horizontal';
        if (findWordAt(row, col, toggled)) {
          direction = toggled;
        }
      }

      let word = findWordAt(row, col, direction);
      if (!word) {
        const other = direction === 'horizontal' ? 'vertical' : 'horizontal';
        word = findWordAt(row, col, other);
        if (word) direction = other;
      }

      if (!word) return;

      state.direction = direction;
      state.selectedWord = word;
      state.cursorCell = firstEmptyCell(word, { row, col });
      state.lastClickedCell = { row, col };
      updateHighlighting();
    }

    function placeLetter(letter) {
      const { row, col } = state.cursorCell;
      state.gridLetters[row][col] = letter;
      getCell(row, col).querySelector('.cell-letter').textContent = letter;
      advanceCursor();
    }

    function advanceCursor() {
      const cells = getWordCells(state.selectedWord);
      const currentIndex = cells.findIndex(
        c => c.row === state.cursorCell.row && c.col === state.cursorCell.col
      );

      for (let i = 1; i <= cells.length; i++) {
        const next = cells[(currentIndex + i) % cells.length];
        if (state.gridLetters[next.row][next.col] === '') {
          state.cursorCell = next;
          updateHighlighting();
          return;
        }
      }

      updateHighlighting();
    }

    function deleteLetter() {
      const cells = getWordCells(state.selectedWord);
      const currentIndex = cells.findIndex(
        c => c.row === state.cursorCell.row && c.col === state.cursorCell.col
      );

      const { row, col } = state.cursorCell;

      if (state.gridLetters[row][col] !== '') {
        state.gridLetters[row][col] = '';
        getCell(row, col).querySelector('.cell-letter').textContent = '';
      } else {
        for (let i = 1; i <= cells.length; i++) {
          const prev = cells[(currentIndex - i + cells.length) % cells.length];
          if (state.gridLetters[prev.row][prev.col] !== '') {
            state.gridLetters[prev.row][prev.col] = '';
            getCell(prev.row, prev.col).querySelector('.cell-letter').textContent = '';
            state.cursorCell = prev;
            break;
          }
        }
      }

      updateHighlighting();
    }

    renderGrid(puzzle);

    document.getElementById('grid-container').addEventListener('click', (e) => {
      const cell = e.target.closest('.cell-white');
      if (!cell) return;
      selectWord(parseInt(cell.dataset.row), parseInt(cell.dataset.col));
    });

    document.addEventListener('keydown', (e) => {
      if (!state.selectedWord || !state.cursorCell) return;

      const key = e.key.toUpperCase();
      if (key.length === 1 && key >= 'A' && key <= 'Z') {
        e.preventDefault();
        placeLetter(key);
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        deleteLetter();
      }
    });
  </script>
</body>
</html>
