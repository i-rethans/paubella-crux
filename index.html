<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crux</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #faf7f2;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 4rem 2rem 2rem;
      }

      header {
        margin-bottom: 1.5rem;
      }

      h1 {
        font-family: Georgia, serif;
        font-size: 2.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #2c2420;
      }

      #puzzle-title {
        font-size: 1rem;
        font-weight: 400;
        color: #a08060;
      }

      .puzzle-name {
        font-family: Georgia, serif;
        font-size: 1.7rem;
        font-weight: 700;
        color: #2c2420;
        margin: 0;
      }

      .subtitle {
        font-size: 0.8rem;
        color: #a08060;
        text-align: center;
        margin: 0.2rem 0 0 0;
        letter-spacing: 0.1em;
      }

      main {
        display: flex;
        gap: 2rem;
      }

      #grid-container {
        display: grid;
        gap: 0;
        border: 2px solid #2c2420;
        background: #2c2420;
        width: fit-content;
      }

      .cell {
        width: 44px;
        height: 44px;
        position: relative;
        border: 1px solid #2c2420;
      }

      .cell-black {
        background: #2c2420;
      }

      .cell-white {
        background: #fffdf8;
        cursor: pointer;
      }

      .cell-number {
        position: absolute;
        top: 1px;
        left: 2px;
        font-size: 10px;
        line-height: 1;
        color: #2c2420;
        pointer-events: none;
      }

      .cell-letter {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-size: 20px;
        font-weight: 500;
        color: #2c2420;
        text-transform: uppercase;
      }

      .cell-highlight {
        background: #f0dfc8;
      }

      .cell-active {
        background: #d4b896;
      }

      #clues-container {
        display: flex;
        gap: 2rem;
        max-height: 532px;
        overflow: hidden;
      }

      .clues-column {
        min-width: 240px;
        max-width: 320px;
      }

      .clues-column h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #2c2420;
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .clues-list {
        max-height: 500px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .clue-item {
        display: flex;
        gap: 0.5rem;
        padding: 0.35rem 0.5rem;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.9rem;
        line-height: 1.4;
        color: #4a3f35;
      }

      .clue-item:hover {
        background: #f0ebe0;
      }

      .clue-number {
        font-weight: 700;
        min-width: 1.5em;
        color: #2c2420;
      }

      .clue-active {
        background: #f0dfc8;
      }

      .clue-active:hover {
        background: #f0dfc8;
      }

      @keyframes confetti-fall {
        0% {
          transform: translateY(-20px) translateX(0) rotate(0deg);
          opacity: 1;
        }
        25% {
          transform: translateY(27vh) translateX(15px) rotate(180deg);
          opacity: 1;
        }
        50% {
          transform: translateY(55vh) translateX(-10px) rotate(360deg);
          opacity: 1;
        }
        75% {
          transform: translateY(82vh) translateX(12px) rotate(540deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) translateX(-5px) rotate(720deg);
          opacity: 0;
        }
      }

      .confetti-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        overflow: hidden;
        z-index: 1000;
      }

      .confetti-particle {
        position: absolute;
        top: -20px;
        border-radius: 2px;
        animation: confetti-fall linear forwards;
      }

      .celebration-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1001;
        opacity: 0;
        transition: opacity 600ms ease;
      }

      .celebration-backdrop.visible {
        opacity: 1;
      }

      .celebration-card {
        background: #ffffff;
        border-radius: 12px;
        padding: 2.5rem 3rem;
        max-width: 620px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      }

      .celebration-header {
        font-size: 1.75rem;
        font-weight: 700;
        color: #2c2420;
        margin-bottom: 1rem;
      }

      .celebration-message {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #4a3f35;
        white-space: pre-line;
      }

      .celebration-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1.5rem;
      }

      .celebration-btn {
        padding: 0.6rem 1.5rem;
        border-radius: 6px;
        border: none;
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 600;
      }

      .btn-close {
        background: #2c2420;
        color: #fffdf8;
      }

      .btn-close:hover {
        background: #4a3f35;
      }

      .btn-reset {
        background: transparent;
        color: #a08060;
        border: 1px solid #a08060;
      }

      .btn-reset:hover {
        background: #f0ebe0;
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }

      #back-link {
        color: #a08060;
        text-decoration: none;
        font-size: 1rem;
      }

      #back-link:hover {
        color: #2c2420;
      }

      #view-selection {
        margin-top: 4rem;
      }

      #view-selection header {
        text-align: center;
        margin-bottom: 4rem;
      }

      #selection-content {
        max-width: 700px;
        width: 100%;
      }

      .puzzle-cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
      }

      .puzzle-card {
        background: #fffdf8;
        border: 2px solid #e8ddd0;
        border-radius: 10px;
        padding: 2rem 2.25rem;
        cursor: pointer;
        transition:
          border-color 200ms,
          box-shadow 200ms;
      }

      .puzzle-card:hover {
        border-color: #d4b896;
        box-shadow: 0 2px 8px rgba(44, 36, 32, 0.08);
      }

      .puzzle-card-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.6rem;
      }

      .puzzle-card-title {
        font-family: Georgia, serif;
        font-size: 1.15rem;
        font-weight: 700;
        color: #2c2420;
      }

      .puzzle-card-check {
        color: #98d8aa;
        font-size: 1.1rem;
      }

      .puzzle-card-subtitle {
        font-size: 0.8rem;
        color: #a08060;
        margin-bottom: 0.75rem;
      }

      .puzzle-card-description {
        font-size: 0.85rem;
        color: #4a3f35;
        margin-bottom: 0.75rem;
      }

      .puzzle-card-progress {
        font-size: 0.75rem;
        color: #a08060;
      }

      .progress-bar {
        height: 5px;
        background: #e8ddd0;
        border-radius: 2px;
        margin-top: 0.35rem;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: #d4b896;
        border-radius: 2px;
        transition: width 300ms;
      }
    </style>
  </head>
  <body>
    <div id="view-selection" style="display: none">
      <header>
        <h1>Paubella Crux</h1>
      </header>
      <main id="selection-content">
        <p>Puzzels laden...</p>
      </main>
    </div>

    <div id="view-puzzle" style="display: none">
      <header>
        <div class="header-top">
          <a id="back-link" href="#">&larr; Puzzels</a>
          <p class="puzzle-name" id="puzzle-subtitle-title"></p>
          <h1 id="puzzle-title">Paubella Crux</h1>
        </div>
        <p class="subtitle" id="puzzle-subtitle-date"></p>
      </header>
      <main>
        <div id="grid-container"></div>
        <div id="clues-container">
          <div class="clues-column">
            <h2>Horizontaal</h2>
            <div id="clues-horizontal" class="clues-list"></div>
          </div>
          <div class="clues-column">
            <h2>Verticaal</h2>
            <div id="clues-vertical" class="clues-list"></div>
          </div>
        </div>
      </main>
    </div>
    <script>
      let puzzle = null;
      let state = null;
      let wordLookup = null;
      let clueElements = {};
      let currentPuzzleId = null;

      function parseGrid(textRows) {
        return {
          grid: textRows.map((row) =>
            [...row].map((ch) => (ch === "#" ? null : "")),
          ),
          solution: textRows.map((row) =>
            [...row].map((ch) => (ch === "#" ? null : ch)),
          ),
        };
      }

      function detectWords(grid, rows, cols) {
        const words = [];
        for (let r = 0; r < rows; r++) {
          let start = null;
          for (let c = 0; c <= cols; c++) {
            if (c < cols && grid[r][c] !== null) {
              if (start === null) start = c;
            } else {
              if (start !== null && c - start >= 2) {
                words.push({
                  direction: "horizontal",
                  row: r,
                  col: start,
                  length: c - start,
                });
              }
              start = null;
            }
          }
        }
        for (let c = 0; c < cols; c++) {
          let start = null;
          for (let r = 0; r <= rows; r++) {
            if (r < rows && grid[r][c] !== null) {
              if (start === null) start = r;
            } else {
              if (start !== null && r - start >= 2) {
                words.push({
                  direction: "vertical",
                  row: start,
                  col: c,
                  length: r - start,
                });
              }
              start = null;
            }
          }
        }
        return words;
      }

      function assignNumbers(words) {
        const starts = new Map();
        let num = 1;
        const sorted = [...words].sort(
          (a, b) => a.row - b.row || a.col - b.col,
        );
        for (const word of sorted) {
          const key = `${word.row},${word.col}`;
          if (!starts.has(key)) {
            starts.set(key, num++);
          }
          word.number = starts.get(key);
        }
        return sorted;
      }

      function buildClues(numberedWords, clueTexts, solution) {
        const clues = { horizontal: [], vertical: [] };
        for (const word of numberedWords) {
          let wordStr = "";
          for (let i = 0; i < word.length; i++) {
            if (word.direction === "horizontal") {
              wordStr += solution[word.row][word.col + i];
            } else {
              wordStr += solution[word.row + i][word.col];
            }
          }

          const dirClues = clueTexts[word.direction];
          let text = dirClues[wordStr];
          if (!text) {
            const posKey = `${wordStr}:${word.row},${word.col}`;
            text = dirClues[posKey];
          }
          if (!text) {
            console.error(
              `Missing clue: ${word.direction} "${wordStr}" at (${word.row},${word.col}), number ${word.number}`,
            );
            continue;
          }

          clues[word.direction].push({
            number: word.number,
            row: word.row,
            col: word.col,
            length: word.length,
            direction: word.direction,
            clue: text,
          });
        }
        return clues;
      }

      function validatePuzzle(puzzle) {
        const errors = [];

        if (puzzle.grid.length !== puzzle.rows) {
          errors.push(
            `Grid has ${puzzle.grid.length} rows, expected ${puzzle.rows}`,
          );
        }
        if (!puzzle.grid.every((row) => row.length === puzzle.cols)) {
          errors.push(`Not all grid rows have ${puzzle.cols} columns`);
        }
        if (puzzle.solution.length !== puzzle.rows) {
          errors.push(
            `Solution has ${puzzle.solution.length} rows, expected ${puzzle.rows}`,
          );
        }
        if (!puzzle.solution.every((row) => row.length === puzzle.cols)) {
          errors.push(`Not all solution rows have ${puzzle.cols} columns`);
        }

        for (let r = 0; r < puzzle.rows; r++) {
          for (let c = 0; c < puzzle.cols; c++) {
            const gridBlack = puzzle.grid[r][c] === null;
            const solBlack = puzzle.solution[r][c] === null;
            if (gridBlack !== solBlack) {
              errors.push(`Black cell mismatch at (${r},${c})`);
            }
            if (!solBlack && !/^[A-Z]$/.test(puzzle.solution[r][c])) {
              errors.push(
                `Invalid solution character "${puzzle.solution[r][c]}" at (${r},${c})`,
              );
            }
          }
        }

        const detected = assignNumbers(
          detectWords(puzzle.grid, puzzle.rows, puzzle.cols),
        );
        const allClues = [...puzzle.clues.horizontal, ...puzzle.clues.vertical];

        for (const word of detected) {
          const clue = allClues.find(
            (c) =>
              c.direction === word.direction &&
              c.row === word.row &&
              c.col === word.col,
          );
          if (!clue) {
            errors.push(
              `No clue for ${word.direction} word at (${word.row},${word.col}), length ${word.length}, expected number ${word.number}`,
            );
          } else if (clue.length !== word.length) {
            errors.push(
              `Length mismatch for ${word.direction} ${clue.number}: clue says ${clue.length}, grid has ${word.length}`,
            );
          } else if (clue.number !== word.number) {
            errors.push(
              `Number mismatch at (${word.row},${word.col}): clue says ${clue.number}, expected ${word.number}`,
            );
          }
        }

        for (const clue of allClues) {
          const match = detected.find(
            (w) =>
              w.direction === clue.direction &&
              w.row === clue.row &&
              w.col === clue.col,
          );
          if (!match) {
            errors.push(
              `Orphan clue: ${clue.direction} ${clue.number} at (${clue.row},${clue.col}) has no matching word in grid`,
            );
          }
        }

        if (errors.length > 0) {
          console.error("Puzzle validation failed:");
          errors.forEach((e) => console.error("  " + e));
        } else {
          console.log("Puzzle data validated OK");
        }
        return errors.length === 0;
      }

      function buildNumberMap(clues) {
        const map = {};
        for (const clue of [...clues.horizontal, ...clues.vertical]) {
          map[`${clue.row},${clue.col}`] = clue.number;
        }
        return map;
      }

      function buildWordLookup(p) {
        const lookup = { horizontal: {}, vertical: {} };
        for (const clue of p.clues.horizontal) {
          for (let i = 0; i < clue.length; i++) {
            lookup.horizontal[`${clue.row},${clue.col + i}`] = clue;
          }
        }
        for (const clue of p.clues.vertical) {
          for (let i = 0; i < clue.length; i++) {
            lookup.vertical[`${clue.row + i},${clue.col}`] = clue;
          }
        }
        return lookup;
      }

      function getCell(row, col) {
        return document.querySelector(
          `.cell[data-row="${row}"][data-col="${col}"]`,
        );
      }

      function getWordCells(clue) {
        const cells = [];
        for (let i = 0; i < clue.length; i++) {
          if (clue.direction === "horizontal") {
            cells.push({ row: clue.row, col: clue.col + i });
          } else {
            cells.push({ row: clue.row + i, col: clue.col });
          }
        }
        return cells;
      }

      function findWordAt(row, col, direction) {
        return wordLookup[direction][`${row},${col}`] || null;
      }

      function firstEmptyCell(clue, fallback) {
        const cells = getWordCells(clue);
        for (const cell of cells) {
          if (state.gridLetters[cell.row][cell.col] === "") {
            return cell;
          }
        }
        return fallback || cells[0];
      }

      function renderGrid(p) {
        const container = document.getElementById("grid-container");
        container.style.gridTemplateColumns = `repeat(${p.cols}, 44px)`;
        container.style.gridTemplateRows = `repeat(${p.rows}, 44px)`;

        const numberMap = buildNumberMap(p.clues);

        for (let r = 0; r < p.rows; r++) {
          for (let c = 0; c < p.cols; c++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.row = r;
            cell.dataset.col = c;

            if (p.grid[r][c] === null) {
              cell.classList.add("cell-black");
            } else {
              cell.classList.add("cell-white");

              const number = numberMap[`${r},${c}`];
              if (number !== undefined) {
                const numSpan = document.createElement("span");
                numSpan.classList.add("cell-number");
                numSpan.textContent = number;
                cell.appendChild(numSpan);
              }

              const letterSpan = document.createElement("span");
              letterSpan.classList.add("cell-letter");
              cell.appendChild(letterSpan);
            }

            container.appendChild(cell);
          }
        }
      }

      function renderClues(p) {
        const hContainer = document.getElementById("clues-horizontal");
        const vContainer = document.getElementById("clues-vertical");

        for (const clue of p.clues.horizontal) {
          const item = document.createElement("div");
          item.classList.add("clue-item");
          item.dataset.direction = "horizontal";
          item.dataset.number = clue.number;

          const num = document.createElement("span");
          num.classList.add("clue-number");
          num.textContent = clue.number + ".";

          const text = document.createElement("span");
          text.classList.add("clue-text");
          text.textContent = clue.clue;

          item.appendChild(num);
          item.appendChild(text);
          hContainer.appendChild(item);
          clueElements[`horizontal-${clue.number}`] = item;
        }

        for (const clue of p.clues.vertical) {
          const item = document.createElement("div");
          item.classList.add("clue-item");
          item.dataset.direction = "vertical";
          item.dataset.number = clue.number;

          const num = document.createElement("span");
          num.classList.add("clue-number");
          num.textContent = clue.number + ".";

          const text = document.createElement("span");
          text.classList.add("clue-text");
          text.textContent = clue.clue;

          item.appendChild(num);
          item.appendChild(text);
          vContainer.appendChild(item);
          clueElements[`vertical-${clue.number}`] = item;
        }
      }

      function updateHighlighting() {
        document
          .querySelectorAll(".cell-highlight, .cell-active")
          .forEach((el) => {
            el.classList.remove("cell-highlight", "cell-active");
          });

        const prevActive = document.querySelector(".clue-active");
        if (prevActive) prevActive.classList.remove("clue-active");

        if (!state || !state.selectedWord) return;

        const cells = getWordCells(state.selectedWord);
        for (const { row, col } of cells) {
          getCell(row, col).classList.add("cell-highlight");
        }

        if (state.cursorCell) {
          const active = getCell(state.cursorCell.row, state.cursorCell.col);
          active.classList.remove("cell-highlight");
          active.classList.add("cell-active");
        }

        const key = `${state.selectedWord.direction}-${state.selectedWord.number}`;
        const clueEl = clueElements[key];
        if (clueEl) {
          clueEl.classList.add("clue-active");
          clueEl.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }

      function selectWord(row, col) {
        const sameCell =
          state.lastClickedCell &&
          state.lastClickedCell.row === row &&
          state.lastClickedCell.col === col;

        let direction = state.direction;

        if (sameCell) {
          const toggled =
            direction === "horizontal" ? "vertical" : "horizontal";
          if (findWordAt(row, col, toggled)) {
            direction = toggled;
          }
        }

        let word = findWordAt(row, col, direction);
        if (!word) {
          const other = direction === "horizontal" ? "vertical" : "horizontal";
          word = findWordAt(row, col, other);
          if (word) direction = other;
        }

        if (!word) return;

        state.direction = direction;
        state.selectedWord = word;
        state.cursorCell = firstEmptyCell(word, { row, col });
        state.lastClickedCell = { row, col };
        updateHighlighting();
      }

      function selectClue(clue) {
        state.direction = clue.direction;
        state.selectedWord = clue;
        state.cursorCell = firstEmptyCell(clue, {
          row: clue.row,
          col: clue.col,
        });
        state.lastClickedCell = null;
        updateHighlighting();
      }

      function placeLetter(letter) {
        const { row, col } = state.cursorCell;
        state.gridLetters[row][col] = letter;
        getCell(row, col).querySelector(".cell-letter").textContent = letter;
        advanceCursor();
        checkCompletion();
        saveProgress();
      }

      function advanceCursor() {
        const cells = getWordCells(state.selectedWord);
        const currentIndex = cells.findIndex(
          (c) =>
            c.row === state.cursorCell.row && c.col === state.cursorCell.col,
        );

        for (let i = 1; i <= cells.length; i++) {
          const next = cells[(currentIndex + i) % cells.length];
          if (state.gridLetters[next.row][next.col] === "") {
            state.cursorCell = next;
            updateHighlighting();
            return;
          }
        }

        updateHighlighting();
      }

      function deleteLetter() {
        const cells = getWordCells(state.selectedWord);
        const currentIndex = cells.findIndex(
          (c) =>
            c.row === state.cursorCell.row && c.col === state.cursorCell.col,
        );

        const { row, col } = state.cursorCell;

        if (state.gridLetters[row][col] !== "") {
          state.gridLetters[row][col] = "";
          getCell(row, col).querySelector(".cell-letter").textContent = "";
        } else {
          for (let i = 1; i <= cells.length; i++) {
            const prev =
              cells[(currentIndex - i + cells.length) % cells.length];
            if (state.gridLetters[prev.row][prev.col] !== "") {
              state.gridLetters[prev.row][prev.col] = "";
              getCell(prev.row, prev.col).querySelector(
                ".cell-letter",
              ).textContent = "";
              state.cursorCell = prev;
              break;
            }
          }
        }

        updateHighlighting();
        saveProgress();
      }

      function saveProgress() {
        if (!currentPuzzleId) return;
        localStorage.setItem(
          `crux-progress-${currentPuzzleId}`,
          JSON.stringify(state.gridLetters),
        );
      }

      function restoreProgress() {
        if (!currentPuzzleId) return;
        const saved = localStorage.getItem(`crux-progress-${currentPuzzleId}`);
        if (!saved) return;

        let parsed;
        try {
          parsed = JSON.parse(saved);
        } catch (e) {
          return;
        }

        if (!Array.isArray(parsed) || parsed.length !== puzzle.rows) return;
        if (
          !parsed.every(
            (row) => Array.isArray(row) && row.length === puzzle.cols,
          )
        )
          return;

        for (let r = 0; r < puzzle.rows; r++) {
          for (let c = 0; c < puzzle.cols; c++) {
            if (
              puzzle.grid[r][c] !== null &&
              typeof parsed[r][c] === "string" &&
              /^[A-Z]$/.test(parsed[r][c])
            ) {
              state.gridLetters[r][c] = parsed[r][c];
              getCell(r, c).querySelector(".cell-letter").textContent =
                parsed[r][c];
            }
          }
        }

        checkCompletion();
      }

      function checkCompletion() {
        for (let r = 0; r < puzzle.rows; r++) {
          for (let c = 0; c < puzzle.cols; c++) {
            if (puzzle.grid[r][c] !== null && state.gridLetters[r][c] === "") {
              return;
            }
          }
        }

        for (let r = 0; r < puzzle.rows; r++) {
          for (let c = 0; c < puzzle.cols; c++) {
            if (
              puzzle.grid[r][c] !== null &&
              state.gridLetters[r][c] !== puzzle.solution[r][c]
            ) {
              return;
            }
          }
        }

        state.completed = true;
        if (currentPuzzleId) {
          localStorage.setItem(`crux-completed-${currentPuzzleId}`, "true");
        }
        setTimeout(() => showCelebration(), 300);
      }

      function showCelebration() {
        const confettiContainer = document.createElement("div");
        confettiContainer.classList.add("confetti-container");

        const colors = [
          "#FFD700",
          "#FF6B6B",
          "#FFB5C2",
          "#87CEEB",
          "#98D8AA",
          "#C4A7E7",
        ];

        for (let i = 0; i < 150; i++) {
          const particle = document.createElement("div");
          particle.classList.add("confetti-particle");
          particle.style.left = Math.random() * 100 + "%";
          particle.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];
          particle.style.width = 8 + Math.random() * 4 + "px";
          particle.style.height = 10 + Math.random() * 6 + "px";
          particle.style.animationDuration = 2 + Math.random() * 2 + "s";
          particle.style.animationDelay = Math.random() * 0.8 + "s";
          confettiContainer.appendChild(particle);
        }

        document.body.appendChild(confettiContainer);
        setTimeout(() => confettiContainer.remove(), 5000);

        setTimeout(() => {
          const backdrop = document.createElement("div");
          backdrop.classList.add("celebration-backdrop");

          const card = document.createElement("div");
          card.classList.add("celebration-card");

          const header = document.createElement("h2");
          header.classList.add("celebration-header");
          header.textContent = puzzle.celebration
            ? puzzle.celebration.title
            : "Puzzel opgelost!";

          const message = document.createElement("p");
          message.classList.add("celebration-message");
          message.textContent = puzzle.celebration
            ? puzzle.celebration.message
            : "";

          const buttons = document.createElement("div");
          buttons.classList.add("celebration-buttons");

          const closeBtn = document.createElement("button");
          closeBtn.classList.add("celebration-btn", "btn-close");
          closeBtn.textContent = "Sluiten";
          closeBtn.addEventListener("click", () => backdrop.remove());

          const resetBtn = document.createElement("button");
          resetBtn.classList.add("celebration-btn", "btn-reset");
          resetBtn.textContent = "Opnieuw spelen";
          resetBtn.addEventListener("click", () => {
            backdrop.remove();
            resetPuzzle();
          });

          buttons.appendChild(closeBtn);
          buttons.appendChild(resetBtn);

          card.appendChild(header);
          card.appendChild(message);
          card.appendChild(buttons);
          backdrop.appendChild(card);
          document.body.appendChild(backdrop);

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              backdrop.classList.add("visible");
            });
          });
        }, 500);
      }

      function resetPuzzle() {
        state.completed = false;
        state.direction = "horizontal";
        state.cursorCell = null;
        state.selectedWord = null;
        state.lastClickedCell = null;
        for (let r = 0; r < puzzle.rows; r++) {
          for (let c = 0; c < puzzle.cols; c++) {
            if (puzzle.grid[r][c] !== null) {
              state.gridLetters[r][c] = "";
              getCell(r, c).querySelector(".cell-letter").textContent = "";
            }
          }
        }
        updateHighlighting();
        if (currentPuzzleId) {
          localStorage.removeItem(`crux-progress-${currentPuzzleId}`);
          localStorage.removeItem(`crux-completed-${currentPuzzleId}`);
        }
      }

      function getPuzzleProgress(id) {
        const completed = localStorage.getItem(`crux-completed-${id}`);
        if (completed === "true")
          return { filled: -1, total: -1, completed: true };

        const saved = localStorage.getItem(`crux-progress-${id}`);
        if (!saved) return { filled: 0, total: 0, completed: false };

        let parsed;
        try {
          parsed = JSON.parse(saved);
        } catch (e) {
          return { filled: 0, total: 0, completed: false };
        }

        let filled = 0;
        let total = 0;
        for (const row of parsed) {
          if (!Array.isArray(row)) continue;
          for (const cell of row) {
            if (cell !== null) {
              total++;
              if (typeof cell === "string" && /^[A-Z]$/.test(cell)) filled++;
            }
          }
        }

        return { filled, total, completed: false };
      }

      async function loadPuzzle(id) {
        const gridContainer = document.getElementById("grid-container");
        gridContainer.innerHTML = "";
        document.getElementById("clues-horizontal").innerHTML = "";
        document.getElementById("clues-vertical").innerHTML = "";
        clueElements = {};

        const response = await fetch(`puzzles/${id}.json`);
        if (!response.ok) {
          console.error(`Failed to load puzzle ${id}: ${response.status}`);
          return;
        }
        const data = await response.json();

        const { grid, solution } = parseGrid(data.grid);
        const rows = data.grid.length;
        const cols = data.grid[0].length;

        const numberedWords = assignNumbers(detectWords(grid, rows, cols));
        const clues = buildClues(numberedWords, data.clues, solution);

        currentPuzzleId = id;
        puzzle = {
          rows,
          cols,
          grid,
          solution,
          clues,
          celebration: data.celebration || null,
        };
        validatePuzzle(puzzle);

        state = {
          direction: "horizontal",
          cursorCell: null,
          selectedWord: null,
          lastClickedCell: null,
          gridLetters: grid.map((row) =>
            row.map((cell) => (cell === null ? null : "")),
          ),
          completed: false,
        };
        wordLookup = buildWordLookup(puzzle);

        document.getElementById("puzzle-title").textContent = "Paubella Crux";
        document.getElementById("puzzle-subtitle-title").textContent =
          data.title || "";
        document.getElementById("puzzle-subtitle-date").textContent =
          data.subtitle ? `⋆ ${data.subtitle} ⋆` : "";

        renderGrid(puzzle);
        renderClues(puzzle);
        restoreProgress();
      }

      async function showSelection() {
        document.getElementById("view-selection").style.display = "";
        document.getElementById("view-puzzle").style.display = "none";

        const content = document.getElementById("selection-content");

        try {
          const response = await fetch("puzzles/index.json");
          const manifest = await response.json();

          content.innerHTML = "";
          const cards = document.createElement("div");
          cards.classList.add("puzzle-cards");

          for (const entry of manifest) {
            const card = document.createElement("div");
            card.classList.add("puzzle-card");
            card.addEventListener("click", () => {
              location.hash = entry.id;
            });

            const progress = getPuzzleProgress(entry.id);

            const headerDiv = document.createElement("div");
            headerDiv.classList.add("puzzle-card-header");

            const title = document.createElement("span");
            title.classList.add("puzzle-card-title");
            title.textContent = entry.title;
            headerDiv.appendChild(title);

            if (progress.completed) {
              const check = document.createElement("span");
              check.classList.add("puzzle-card-check");
              check.textContent = "✓";
              headerDiv.appendChild(check);
            }

            card.appendChild(headerDiv);

            const subtitle = document.createElement("div");
            subtitle.classList.add("puzzle-card-subtitle");
            subtitle.textContent = entry.subtitle;
            card.appendChild(subtitle);

            const desc = document.createElement("div");
            desc.classList.add("puzzle-card-description");
            desc.textContent = entry.description;
            card.appendChild(desc);

            if (!progress.completed && progress.total > 0) {
              const progressDiv = document.createElement("div");
              progressDiv.classList.add("puzzle-card-progress");
              progressDiv.textContent = `${progress.filled} / ${progress.total} letters`;

              const bar = document.createElement("div");
              bar.classList.add("progress-bar");
              const fill = document.createElement("div");
              fill.classList.add("progress-bar-fill");
              fill.style.width = `${Math.round((progress.filled / progress.total) * 100)}%`;
              bar.appendChild(fill);
              progressDiv.appendChild(bar);
              card.appendChild(progressDiv);
            }

            cards.appendChild(card);
          }

          content.appendChild(cards);
        } catch (e) {
          content.innerHTML = "<p>Kon puzzels niet laden.</p>";
          console.error("Failed to load manifest:", e);
        }
      }

      function showPuzzleView() {
        document.getElementById("view-selection").style.display = "none";
        document.getElementById("view-puzzle").style.display = "";
      }

      async function route() {
        const hash = location.hash.slice(1);
        if (hash) {
          await loadPuzzle(hash);
          showPuzzleView();
        } else {
          await showSelection();
        }
      }

      window.addEventListener("hashchange", route);
      route();

      document
        .getElementById("clues-container")
        .addEventListener("click", (e) => {
          if (!puzzle || state.completed) return;
          const item = e.target.closest(".clue-item");
          if (!item) return;
          const direction = item.dataset.direction;
          const number = parseInt(item.dataset.number);
          const clue = puzzle.clues[direction].find((c) => c.number === number);
          if (clue) selectClue(clue);
        });

      document
        .getElementById("grid-container")
        .addEventListener("click", (e) => {
          if (!puzzle || state.completed) return;
          const cell = e.target.closest(".cell-white");
          if (!cell) return;
          selectWord(parseInt(cell.dataset.row), parseInt(cell.dataset.col));
        });

      document.addEventListener("keydown", (e) => {
        if (!puzzle || state.completed) return;

        if (
          e.key === "ArrowLeft" ||
          e.key === "ArrowRight" ||
          e.key === "ArrowUp" ||
          e.key === "ArrowDown"
        ) {
          e.preventDefault();

          if (!state.selectedWord) {
            const first = puzzle.clues.horizontal[0];
            if (first) selectClue(first);
            return;
          }

          if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
            const clueList = puzzle.clues[state.direction];
            const currentIndex = clueList.findIndex(
              (c) =>
                c.number === state.selectedWord.number &&
                c.direction === state.selectedWord.direction,
            );
            let nextIndex;
            if (e.key === "ArrowRight") {
              nextIndex = (currentIndex + 1) % clueList.length;
            } else {
              nextIndex =
                (currentIndex - 1 + clueList.length) % clueList.length;
            }
            selectClue(clueList[nextIndex]);
          } else {
            const newDirection =
              state.direction === "horizontal" ? "vertical" : "horizontal";
            const word = findWordAt(
              state.cursorCell.row,
              state.cursorCell.col,
              newDirection,
            );
            if (word) {
              state.direction = newDirection;
              selectClue(word);
            } else {
              const first = puzzle.clues[newDirection][0];
              if (first) {
                state.direction = newDirection;
                selectClue(first);
              }
            }
          }
          return;
        }

        if (!state.selectedWord || !state.cursorCell) return;

        const key = e.key.toUpperCase();
        if (key.length === 1 && key >= "A" && key <= "Z") {
          e.preventDefault();
          placeLetter(key);
        } else if (e.key === "Backspace") {
          e.preventDefault();
          deleteLetter();
        }
      });
    </script>
  </body>
</html>
